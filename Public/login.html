<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link rel="stylesheet" href="../assets/styles/style.css">


</head>

<body class="loginFundo">
    <div>
        <header>
            <div class="titulo">
                <img src="../assets/img/Rick_and_Morty_logo.svg">
            </div>
        </header>

        <main>

            <div id="container">

                <h2 id="titulo">Login</h2>

                <form id="form-login">
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Email address</label>
                        <input type="email" id="senha" class="form-control" id="exampleInputEmail1"
                            aria-describedby="emailHelp">
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Password</label>
                        <input type="password" id="senha" class="form-control" id="exampleInputPassword1">
                    </div>
                    <button type="submit" id="botao-envio" class="btn btn-primary">Entrar </button>
                </form>
                <div id="mensagem"></div>
                <div class="toggle" id="toggle">
                    <p> Não tem conta? Cadastre-se! </p>

                </div>
            </div>

        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
        <script src="script.js"></script>

    </div>
</body>

</html>
